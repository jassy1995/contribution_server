app = 'ss-api'
primary_region = 'iad'

[build]
dockerfile = 'Dockerfile'

[http_service]
internal_port = 2000
force_https = true
auto_stop_machines = 'stop'
auto_start_machines = true
min_machines_running = 1
processes = ['app']

[[vm]]
memory = '2gb'
cpu_kind = 'shared'
cpus = 1

[env]
PORT = 2000
